version: "3.9"

services:
  api:
    build: .
    container_name: tokopedia-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/tokopedia
    depends_on:
      - db
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped

  streamlit:
    build: .
    container_name: tokopedia-streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    command: ["streamlit", "run", "src/streamlit_app/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: tokopedia-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tokopedia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
