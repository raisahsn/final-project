name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

# Workflow ini deploy service `api` dan `ui` ke Railway memakai Railway CLI.
# Secrets yang dibutuhkan (Settings → Secrets and variables → Actions):
#   RAILWAY_API_TOKEN        → account-scoped token (Railway → Account → Tokens)
#   RAILWAY_API_SERVICE_ID   → Service ID untuk service `api`
#   RAILWAY_UI_SERVICE_ID    → Service ID untuk service `ui`
#
# Catatan: pakai token account-scoped (RAILWAY_API_TOKEN), bukan project token,
# supaya `railway up` berjalan non-interaktif di CI.

jobs:
  deploy-api:
    name: Deploy API (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        run: npx --yes @railway/cli up --service=${{ secrets.RAILWAY_API_SERVICE_ID }} --ci
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

  deploy-ui:
    name: Deploy UI (Streamlit)
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        run: npx --yes @railway/cli up --service=${{ secrets.RAILWAY_UI_SERVICE_ID }} --ci
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
