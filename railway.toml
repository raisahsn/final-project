# Konfigurasi Railway untuk service API (FastAPI).
# Paksa builder Dockerfile (image sudah berisi src/, models/, scripts/).
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# PENTING: token pertama startCommand HARUS binary asli.
# Jangan taruh "PYTHONPATH=src uvicorn ..." — Railway akan mengeksekusi
# "PYTHONPATH=src" sebagai nama program → "executable could not be found".
#
# Bungkus dengan `sh -c "..."` supaya:
#   - PYTHONPATH & ${PORT} diekspansi oleh shell,
#   - token[0] = `sh` (binary valid di /bin/sh).
# PYTHONPATH sendiri sudah di-set di Dockerfile (ENV PYTHONPATH=/app/src),
# jadi tidak perlu ditulis di sini.
startCommand = "sh -c \"python scripts/download_models.py || true; uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8000}\""

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
